<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskflow — To-Do</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #F7F6F3;
      --surface:     #FFFFFF;
      --surface2:    #F0EFE9;
      --border:      #E4E2DA;
      --border2:     #CCC9BE;
      --text:        #1A1916;
      --muted:       #888576;
      --accent:      #3D5AF1;
      --accent-lt:   #EEF1FE;
      --accent-dk:   #2A42D4;
      --green:       #1A9B5F;
      --green-lt:    #E6F5EE;
      --red:         #D94040;
      --red-lt:      #FEF0F0;
      --amber:       #C47F00;
      --amber-lt:    #FFF7E0;
      --tag-bg:      #ECEAE3;
      --radius:      12px;
      --radius-lg:   16px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── APP SHELL ── */
    .app {
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── HEADER ── */
    .app-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .app-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }

    .app-title span { color: var(--accent); }

    .header-meta {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
      line-height: 1.6;
    }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-track {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-text { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
    .progress-pct  { font-size: 0.9rem; font-weight: 600; color: var(--accent); min-width: 36px; text-align: right; }

    /* ── ADD TASK FORM ── */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row { display: flex; gap: 10px; align-items: center; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .input-main {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-main::placeholder { color: var(--muted); font-weight: 400; }
    .input-main:focus { border-color: var(--accent); background: #fff; }

    .input-small {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .input-small:focus { border-color: var(--accent); background: #fff; }

    .field-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .field-wrap { display: flex; flex-direction: column; }

    select.input-small { cursor: pointer; }

    .btn-add {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      padding: 12px 22px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-add:hover  { background: var(--accent-dk); }
    .btn-add:active { transform: scale(0.97); }

    /* ── FILTERS & SORT ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }

    .pill {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pill:hover  { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .sort-select {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
      cursor: pointer;
      outline: none;
    }

    /* ── TASK LIST ── */
    .task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: box-shadow 0.2s, border-color 0.2s, opacity 0.3s;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .task-item.done  { opacity: 0.55; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--muted); }

    /* Priority stripe */
    .task-item.pri-high   { border-left: 3px solid var(--red); }
    .task-item.pri-medium { border-left: 3px solid var(--amber); }
    .task-item.pri-low    { border-left: 3px solid var(--green); }

    /* Checkbox */
    .check-btn {
      flex-shrink: 0;
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border2);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      margin-top: 1px;
    }
    .check-btn:hover  { border-color: var(--accent); }
    .check-btn.checked { background: var(--accent); border-color: var(--accent); }
    .check-btn.checked::after {
      content: '';
      display: block;
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    /* Task body */
    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
      margin-bottom: 4px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 500;
      border-radius: 99px;
      padding: 2px 10px;
    }
    .tag-priority-high   { background: var(--red-lt);   color: var(--red); }
    .tag-priority-medium { background: var(--amber-lt); color: var(--amber); }
    .tag-priority-low    { background: var(--green-lt); color: var(--green); }
    .tag-cat  { background: var(--accent-lt); color: var(--accent); }
    .tag-date { background: var(--tag-bg); color: var(--muted); font-size: 0.7rem; }
    .tag-date.overdue { background: var(--red-lt); color: var(--red); }

    /* Edit inline */
    .task-edit-wrap {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .task-edit-wrap.open { display: flex; }
    .edit-input {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      width: 100%;
      outline: none;
    }
    .edit-input:focus { border-color: var(--accent); background: #fff; }
    .edit-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .edit-actions { display: flex; gap: 8px; }

    .btn-sm {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-save   { background: var(--accent); color: #fff; }
    .btn-save:hover { background: var(--accent-dk); }
    .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-cancel:hover { border-color: var(--border2); }

    /* Task action buttons */
    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      transition: background 0.15s, color 0.15s;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn.del:hover { background: var(--red-lt); color: var(--red); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty h3   { font-size: 1rem; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .empty p    { font-size: 0.85rem; }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 4px 0;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--text);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: var(--radius);
      padding: 12px 20px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      .form-row-2 { grid-template-columns: 1fr 1fr; }
      .edit-row   { grid-template-columns: 1fr 1fr; }
      .controls   { flex-direction: column; align-items: flex-start; }
      .app-header { flex-direction: column; align-items: flex-start; }
    }

    @media (prefers-reduced-motion: reduce) {
      .task-item { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="app-header">
    <h1 class="app-title">Task<span>flow</span></h1>
    <div class="header-meta" id="header-meta"></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0 of 0 done</div>
    <div class="progress-pct"  id="progress-pct">0%</div>
  </div>

  <!-- Add task -->
  <div class="add-form">
    <div class="form-row">
      <input class="input-main" id="task-input" type="text" placeholder="What needs to be done?" maxlength="200" autocomplete="off"/>
      <button class="btn-add" id="btn-add">Add task</button>
    </div>
    <div class="form-row-2">
      <div class="field-wrap">
        <div class="field-label">Due date</div>
        <input class="input-small" id="task-date" type="date"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Due time</div>
        <input class="input-small" id="task-time" type="time"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">Priority</div>
        <select class="input-small" id="task-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="field-wrap" style="grid-column:span 2">
        <div class="field-label">Category</div>
        <input class="input-small" id="task-cat" type="text" placeholder="e.g. Work, Personal, Health…" maxlength="30"/>
      </div>
      <div class="field-wrap">
        <div class="field-label">&nbsp;</div>
        <!-- spacer -->
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="filter-pills" id="filter-pills">
      <button class="pill active" data-filter="all">All</button>
      <button class="pill" data-filter="active">Active</button>
      <button class="pill" data-filter="done">Completed</button>
      <button class="pill" data-filter="today">Today</button>
      <button class="pill" data-filter="overdue">Overdue</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="due">Due date</option>
      <option value="priority">Priority</option>
      <option value="az">A → Z</option>
    </select>
  </div>

  <!-- Task list -->
  <div id="task-container"></div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function () {
  /* ─── Storage ─── */
  const STORAGE_KEY = 'taskflow_v2';
  let tasks = [];
  let filter = 'all';
  let sort   = 'newest';

  function load() {
    try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { tasks = []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  /* ─── Helpers ─── */
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function todayStr() {
    const d = new Date();
    return d.toISOString().split('T')[0];
  }

  function fmtDatetime(date, time) {
    if (!date) return '';
    const d = new Date(date + 'T00:00:00');
    const opts = { month: 'short', day: 'numeric' };
    if (d.getFullYear() !== new Date().getFullYear()) opts.year = 'numeric';
    let s = d.toLocaleDateString('en-US', opts);
    if (time) s += ' · ' + fmtTime(time);
    return s;
  }

  function fmtTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hh = h % 12 || 12;
    return hh + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function isOverdue(task) {
    if (!task.date || task.done) return false;
    const due = new Date(task.date + (task.time ? 'T' + task.time : 'T23:59'));
    return due < new Date();
  }

  function isToday(task) {
    return task.date === todayStr();
  }

  const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };

  /* ─── Toast ─── */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ─── Add task ─── */
  function addTask() {
    const title = document.getElementById('task-input').value.trim();
    if (!title) { document.getElementById('task-input').focus(); return; }

    tasks.unshift({
      id:       uid(),
      title,
      date:     document.getElementById('task-date').value,
      time:     document.getElementById('task-time').value,
      priority: document.getElementById('task-priority').value,
      category: document.getElementById('task-cat').value.trim(),
      done:     false,
      created:  Date.now()
    });

    // Reset form
    document.getElementById('task-input').value    = '';
    document.getElementById('task-date').value     = '';
    document.getElementById('task-time').value     = '';
    document.getElementById('task-priority').value = 'medium';
    document.getElementById('task-cat').value      = '';
    document.getElementById('task-input').focus();

    save();
    render();
    showToast('Task added');
  }

  /* ─── Toggle done ─── */
  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  /* ─── Delete ─── */
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
    showToast('Task deleted');
  }

  /* ─── Edit ─── */
  function openEdit(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    const wrap = document.getElementById('edit-' + id);
    if (!wrap) return;
    wrap.querySelector('.edit-title').value    = t.title;
    wrap.querySelector('.edit-date').value     = t.date || '';
    wrap.querySelector('.edit-time').value     = t.time || '';
    wrap.querySelector('.edit-priority').value = t.priority;
    wrap.querySelector('.edit-cat').value      = t.category || '';
    wrap.classList.add('open');
  }

  function saveEdit(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    const wrap = document.getElementById('edit-' + id);
    const title = wrap.querySelector('.edit-title').value.trim();
    if (!title) return;
    t.title    = title;
    t.date     = wrap.querySelector('.edit-date').value;
    t.time     = wrap.querySelector('.edit-time').value;
    t.priority = wrap.querySelector('.edit-priority').value;
    t.category = wrap.querySelector('.edit-cat').value.trim();
    save(); render();
    showToast('Task updated');
  }

  function closeEdit(id) {
    const wrap = document.getElementById('edit-' + id);
    if (wrap) wrap.classList.remove('open');
  }

  /* ─── Filter & sort ─── */
  function getVisible() {
    let list = [...tasks];

    if (filter === 'active')  list = list.filter(t => !t.done);
    if (filter === 'done')    list = list.filter(t => t.done);
    if (filter === 'today')   list = list.filter(t => isToday(t));
    if (filter === 'overdue') list = list.filter(t => isOverdue(t));

    if (sort === 'newest')   list.sort((a, b) => b.created - a.created);
    if (sort === 'oldest')   list.sort((a, b) => a.created - b.created);
    if (sort === 'az')       list.sort((a, b) => a.title.localeCompare(b.title));
    if (sort === 'priority') list.sort((a, b) => PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority]);
    if (sort === 'due') {
      list.sort((a, b) => {
        if (!a.date && !b.date) return 0;
        if (!a.date) return 1;
        if (!b.date) return -1;
        return (a.date + (a.time || '')).localeCompare(b.date + (b.time || ''));
      });
    }

    return list;
  }

  /* ─── Render ─── */
  function render() {
    renderHeader();
    renderProgress();
    renderList();
  }

  function renderHeader() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('header-meta').innerHTML =
      days[now.getDay()] + '<br>' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  function renderProgress() {
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = done + ' of ' + total + ' done';
    document.getElementById('progress-pct').textContent  = pct + '%';
  }

  function renderList() {
    const container = document.getElementById('task-container');
    const visible   = getVisible();

    if (!visible.length) {
      const msgs = {
        all:     ['Nothing here yet', 'Add your first task above to get started.'],
        active:  ['All caught up!', 'No active tasks right now.'],
        done:    ['No completed tasks', 'Finish something — it feels great.'],
        today:   ['Nothing due today', 'Enjoy your free day, or add a task.'],
        overdue: ['No overdue tasks', "You're all on time — nice work."]
      };
      const [h, p] = msgs[filter] || msgs.all;
      container.innerHTML = `<div class="empty">
        <div class="empty-icon">✓</div>
        <h3>${h}</h3><p>${p}</p>
      </div>`;
      return;
    }

    // Group: active then done
    const active  = visible.filter(t => !t.done);
    const done    = visible.filter(t => t.done);
    let html = '';

    if (active.length) {
      if (filter === 'all' && done.length) html += `<div class="section-label" style="margin-bottom:4px">Active · ${active.length}</div>`;
      html += '<div class="task-list">' + active.map(taskHTML).join('') + '</div>';
    }
    if (done.length) {
      if (filter === 'all' && active.length) html += `<div class="section-label" style="margin:16px 0 4px">Completed · ${done.length}</div>`;
      html += '<div class="task-list">' + done.map(taskHTML).join('') + '</div>';
    }

    container.innerHTML = html;
    bindTaskEvents();
  }

  function taskHTML(t) {
    const overdue = isOverdue(t);
    const dateLabel = fmtDatetime(t.date, t.time);
    const dateClass = overdue ? 'tag tag-date overdue' : 'tag tag-date';

    return `
    <div class="task-item pri-${t.priority} ${t.done ? 'done' : ''}" data-id="${t.id}">
      <button class="check-btn ${t.done ? 'checked' : ''}" data-action="toggle" data-id="${t.id}" aria-label="${t.done ? 'Mark incomplete' : 'Mark complete'}"></button>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        <div class="task-meta">
          <span class="tag tag-priority-${t.priority}">${cap(t.priority)}</span>
          ${t.category ? `<span class="tag tag-cat">${esc(t.category)}</span>` : ''}
          ${dateLabel ? `<span class="${dateClass}">${overdue ? '⚠ ' : ''}${esc(dateLabel)}</span>` : ''}
        </div>
        <!-- Edit form -->
        <div class="task-edit-wrap" id="edit-${t.id}">
          <input class="edit-input edit-title" type="text" maxlength="200" placeholder="Task title"/>
          <div class="edit-row">
            <div class="field-wrap"><div class="field-label">Date</div><input class="edit-input edit-date" type="date"/></div>
            <div class="field-wrap"><div class="field-label">Time</div><input class="edit-input edit-time" type="time"/></div>
            <div class="field-wrap"><div class="field-label">Priority</div>
              <select class="edit-input edit-priority">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>
          <div class="field-wrap"><div class="field-label">Category</div><input class="edit-input edit-cat" type="text" maxlength="30" placeholder="Category"/></div>
          <div class="edit-actions">
            <button class="btn-sm btn-save" data-action="save" data-id="${t.id}">Save changes</button>
            <button class="btn-sm btn-cancel" data-action="cancel" data-id="${t.id}">Cancel</button>
          </div>
        </div>
      </div>
      <div class="task-actions">
        <button class="icon-btn" data-action="edit" data-id="${t.id}" aria-label="Edit task">✎</button>
        <button class="icon-btn del" data-action="delete" data-id="${t.id}" aria-label="Delete task">✕</button>
      </div>
    </div>`;
  }

  function bindTaskEvents() {
    document.getElementById('task-container').querySelectorAll('[data-action]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const { action, id } = el.dataset;
        if (action === 'toggle')  toggleDone(id);
        if (action === 'delete')  deleteTask(id);
        if (action === 'edit')    openEdit(id);
        if (action === 'save')    saveEdit(id);
        if (action === 'cancel')  closeEdit(id);
      });
    });

    // Enter to save edit
    document.getElementById('task-container').querySelectorAll('.edit-title').forEach(inp => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const id = inp.closest('.task-edit-wrap').id.replace('edit-', '');
          saveEdit(id);
        }
      });
    });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  /* ─── Event listeners ─── */
  document.getElementById('btn-add').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  document.getElementById('filter-pills').addEventListener('click', e => {
    const pill = e.target.closest('.pill');
    if (!pill) return;
    filter = pill.dataset.filter;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    render();
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    sort = e.target.value;
    render();
  });

  /* ─── Init ─── */
  load();
  render();

  // Refresh overdue badges every minute
  setInterval(render, 60000);
})();
</script>
</body>
</html>
